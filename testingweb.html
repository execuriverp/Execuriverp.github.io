<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Gallery Modern</title>
<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#1e1e2f,#2a2a40);
    color:white;
}
.container{
    width:90%;
    max-width:800px;
    margin:40px auto;
}
.card{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    backdrop-filter:blur(15px);
}
input,button{
    padding:10px;
    border:none;
    border-radius:8px;
    margin:5px 0;
}
button{
    background:#6c63ff;
    color:white;
    cursor:pointer;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}
.gallery img{
    width:100%;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="card" id="authSection">
<h3>Login</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
<p id="authStatus"></p>
</div>

<div class="card" id="uploadSection" style="display:none;">
<h3>Upload PNG</h3>
<input type="file" id="fileInput" accept="image/png">
<button onclick="uploadImage()">Upload</button>
<button onclick="logout()">Logout</button>
<p id="uploadStatus"></p>
</div>

<div class="card">
<h3>Gallery</h3>
<div class="gallery" id="gallery"></div>
</div>

</div>

<script>
Parse.initialize("UqZ751TeTPxZ1kryoUEy4fclTgKVCMTqTuNf2LUp","jx3I9ieWtAqJ50sLS9VrzaUwGk31t3vsHkwk7phb");
Parse.serverURL="https://parseapi.back4app.com/";

if(Parse.User.current()){
    showUpload();
}

async function login(){
    try{
        await Parse.User.logIn(username.value,password.value);
        showUpload();
    }catch(err){
        authStatus.innerText=err.message;
    }
}

async function register(){
    const user=new Parse.User();
    user.set("username",username.value);
    user.set("password",password.value);
    try{
        await user.signUp();
        showUpload();
    }catch(err){
        authStatus.innerText=err.message;
    }
}

function logout(){
    Parse.User.logOut();
    location.reload();
}

function showUpload(){
    authSection.style.display="none";
    uploadSection.style.display="block";
    loadGallery();
}

async function uploadImage(){
    const file=fileInput.files[0];
    if(!file || file.type!=="image/png"){
        uploadStatus.innerText="Pilih PNG!";
        return;
    }

    uploadStatus.innerText="Uploading...";

    try{
        const parseFile=new Parse.File(file.name,file);
        await parseFile.save();

        const Uploads=Parse.Object.extend("Uploads");
        const newUpload=new Uploads();
        newUpload.set("image",parseFile);
        newUpload.set("user",Parse.User.current());
        await newUpload.save();

        uploadStatus.innerText="Upload berhasil!";
        loadGallery();

    }catch(err){
        uploadStatus.innerText=err.message;
    }
}

async function loadGallery(){
    const Uploads=Parse.Object.extend("Uploads");
    const query=new Parse.Query(Uploads);
    query.descending("createdAt");

    const results=await query.find();

    gallery.innerHTML="";
    results.forEach(item=>{
        const file=item.get("image");
        if(file){
            const img=document.createElement("img");
            img.src=file.url();
            gallery.appendChild(img);
        }
    });
}

loadGallery();
</script>

</body>
</html>
